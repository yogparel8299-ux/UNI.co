<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(11, 28, 48, 0.7);
            backdrop-filter: blur(12px);
            border: 0.5px solid rgba(69, 71, 75, 0.3);
        }
        .terminal-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .terminal-scroll::-webkit-scrollbar-track {
            background: rgba(3, 20, 39, 1);
        }
        .terminal-scroll::-webkit-scrollbar-thumb {
            background: rgba(47, 217, 244, 0.2);
            border-radius: 2px;
        }
        .pulse-emerald {
            animation: pulse-emerald 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-emerald {
            0%, 100% { opacity: 1; }
            50% { opacity: .4; }
        }
        .scanline {
            width: 100%;
            height: 2px;
            background: linear-gradient(to bottom, transparent, rgba(47, 217, 244, 0.1), transparent);
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            animation: scan 8s linear infinite;
        }
        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(1000%); }
        }
    </style>
